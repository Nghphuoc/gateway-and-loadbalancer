server:
  port: 8081

spring:
  application:
      name: application
  main:
    log-startup-info: false
  profiles:
    active: ${ENV:local}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}