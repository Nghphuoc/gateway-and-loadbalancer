server:
  port: 8080

eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false
    fetch-registry: true
    service-url:
      defaultZone: http://${eureka.instance.hostname}:8761/eureka/

spring:
  application:
    name: api-gateway
#  profiles:
#    active: ${ENV:local}
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: main-application-route
              uri: lb://application
              predicates:
                - Path=/api/v1/**
              filters:
                - StripPrefix=0
                - AddRequestHeader=X-Source, Gateway-By-Gemini

          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: "http://localhost:3000"
                allowedMethods: [ "GET", "POST", "PUT", "DELETE" ]
                allowedHeaders: "*"